summary: |
  OpenAI is shutting down Sora to concentrate resources on core AI models and enterprise solutions ahead of its anticipated IPO. The video app reportedly cost ~$5B annually while generating under $500K monthly in revenue, with only $2.1M in lifetime in-app purchases. Fidji Simo's title shift from "CEO of Applications" to "AGI Deployment" signals strategic reorientation. OpenAI has completed initial development of its next model codenamed "Spud." The moves reflect intensifying competition with Anthropic for enterprise customers and investor attention, with both companies approaching blockbuster IPOs. Walt Disney abandoned a planned $1B Sora-related investment, while the Sora research team pivots to "world simulation research" for robotics.
