summary: |
  Three individuals connected to Super Micro Computer, including co-founder Yih-Shyan Liaw, were charged with smuggling $2.5 billion worth of advanced NVIDIA chips to China through Southeast Asian intermediaries using falsified paperwork. The case underscores the fundamental tension in US export control policy -- significant demand motivates circumvention, and the primary effect may be enriching intermediaries rather than meaningfully slowing Chinese AI advancement. Separately, Uber signed a $1.25 billion deal with Rivian for robotaxis targeting 2028 deployment, though Rivian has yet to begin R2 production or deploy an autonomous driving system. Trustpilot emerged as the fifth-most cited domain by language models, with LLM-driven click-throughs up 1,490% YoY, as its open data strategy and e-commerce focus gave it a structural advantage over Yelp and Google Reviews in the AI era. The platform's annual profit nearly quadrupled in 2025.
